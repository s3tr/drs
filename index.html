<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Selmin Sevim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .container {
            position: relative;
            text-align: center;
            cursor: default;
        }

        .name-wrapper {
            display: flex;
            gap: 10px;
        }

        .letter {
            display: inline-block;
            font-size: 5rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: transform 0.3s ease, color 0.3s ease, text-shadow 0.3s ease;
            /* Glow Efekti */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3), 
                         0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Hover durumunda dalga ve parlama artışı */
        .letter.active {
            transform: translateY(-25px);
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff, 
                         0 0 40px #00d4ff, 
                         0 0 60px #00d4ff;
        }

        @media (max-width: 768px) {
            .letter { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="name-wrapper" id="nameContainer">
            </div>
    </div>

    <script>
        const name = "DR. SELMİN SEVİM";
        const container = document.getElementById('nameContainer');

        // İsimdeki her harfi span içine alıyoruz (Dalga efekti için)
        name.split('').forEach(char => {
            const span = document.createElement('span');
            span.textContent = char === ' ' ? '\u00A0' : char; // Boşluk kontrolü
            span.className = 'letter';
            container.appendChild(span);
        });

        const letters = document.querySelectorAll('.letter');

        // Mouse hareketine göre dalga efekti
        document.addEventListener('mousemove', (e) => {
            letters.forEach((letter) => {
                const rect = letter.getBoundingClientRect();
                const letterCenterX = rect.left + rect.width / 2;
                const letterCenterY = rect.top + rect.height / 2;

                // Mouse ile harf arasındaki mesafe
                const distance = Math.sqrt(
                    Math.pow(e.clientX - letterCenterX, 2) + 
                    Math.pow(e.clientY - letterCenterY, 2)
                );

                // Eğer mouse yakınsa (100px) aktif et
                if (distance < 100) {
                    letter.classList.add('active');
                } else {
                    letter.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
